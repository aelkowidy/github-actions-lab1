name: CI on Self-hosted Runner

on:
  push:
    branches: [main]

jobs:
  build-and-test:

    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show hostname
        run: hostname && uname -a

      - name: Check Node Version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Cleanup
        run: rm -rf node_modules
